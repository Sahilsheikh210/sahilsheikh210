name: Generate Dynamic README

on:
  schedule:
    - cron: '0 */6 * * *'  # Update every 6 hours
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          npm install @chenglou/pretext canvas
          
      - name: Generate SVG header
        run: node scripts/generate-svg.js
        
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/header.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update dynamic header with Pretext layout"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
