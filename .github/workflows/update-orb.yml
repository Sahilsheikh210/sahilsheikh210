name: Generate Animated Orb

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# NEW: Explicitly grant permissions to push code back to your repo
permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # UPDATED to v4 to fix the warning

      - name: Setup Node.js
        uses: actions/setup-node@v4 # UPDATED to v4
        with:
          node-version: '20'

      - name: Run JavaScript Generator
        run: node generate.js

      - name: Commit and Push SVG
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add plasma-orb.svg
          git commit -m "Update glowing orb animation" || exit 0
          git push
